<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Viewer — Sutra</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --bg-elev: #111114;
    --bg-elev-2: #16161b;
    --border: #1e1e25;
    --text: #e8e8ec;
    --text-dim: #8a8a94;
    --text-faint: #4a4a54;
    --sutra: #8b5cf6;
    --user-accent: #5b9bf5;
    --bash-green: #4ade80;
    --read-blue: #5a95d6;
    --grep-amber: #eab308;
    --web-purple: #a78bfa;
    --font-mono: 'SF Mono', Menlo, 'Cascadia Code', 'Fira Code', monospace;
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --sidebar-w: 280px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* Layout */
  .app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--sutra);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .open-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .open-btn:hover {
    border-color: var(--sutra);
    background: #1a1a22;
  }

  .file-input { display: none; }

  .sidebar-info {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .file-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }

  .file-meta-label { color: var(--text-faint); }
  .file-meta-value { color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }

  .no-file-msg {
    color: var(--text-faint);
    font-size: 12px;
    text-align: center;
    padding: 24px 0;
    line-height: 1.8;
  }

  /* Main panel */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Stats bar */
  .stats-bar {
    display: none;
    padding: 8px 20px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 12px;
  }

  .stats-bar.active { display: flex; }

  .stat {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .stat-label { color: var(--text-faint); }
  .stat-value { color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }

  /* Search bar */
  .search-bar {
    display: none;
    padding: 6px 20px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
  }

  .search-bar.active { display: flex; }

  .search-input {
    flex: 1;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
  }

  .search-input:focus { border-color: var(--sutra); }

  .search-count { font-size: 11px; color: var(--text-faint); min-width: 60px; }

  .search-close {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
  }

  .search-close:hover { color: var(--text); }

  /* Conversation area */
  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
  }

  .conversation::-webkit-scrollbar { width: 6px; }
  .conversation::-webkit-scrollbar-track { background: transparent; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .conversation::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  /* Drop zone */
  .drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-faint);
  }

  .drop-zone-icon {
    width: 64px;
    height: 64px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: border-color 0.2s, color 0.2s;
  }

  .drop-zone-text { font-size: 14px; }
  .drop-zone-hint { font-size: 12px; color: var(--text-faint); opacity: 0.6; }

  .app.drag-over .drop-zone-icon {
    border-color: var(--sutra);
    color: var(--sutra);
  }

  /* Messages */
  .message {
    margin-bottom: 20px;
    padding: 12px 16px;
    border-radius: 8px;
    max-width: 100%;
    position: relative;
  }

  .message.highlighted {
    outline: 2px solid var(--sutra);
    outline-offset: 2px;
  }

  .message-role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  /* User messages */
  .msg-user {
    background: rgba(91, 155, 245, 0.06);
    border-left: 3px solid var(--user-accent);
  }

  .msg-user .message-role { color: var(--user-accent); }

  .msg-user .message-body {
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Assistant messages */
  .msg-assistant {
    background: var(--bg-elev);
    border-left: 3px solid var(--sutra);
  }

  .msg-assistant .message-role { color: var(--sutra); }

  /* System events */
  .msg-system {
    background: transparent;
    padding: 4px 16px;
    margin-bottom: 4px;
  }

  .msg-system .message-role {
    font-size: 10px;
    color: var(--text-faint);
  }

  .msg-system .message-body {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--font-mono);
  }

  /* Result card */
  .msg-result {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }

  .msg-result .message-role {
    color: var(--sutra);
    font-size: 11px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }

  .result-item {
    background: var(--bg);
    border-radius: 6px;
    padding: 8px 10px;
  }

  .result-item-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; }
  .result-item-value { font-size: 13px; color: var(--text); font-family: var(--font-mono); margin-top: 2px; }

  /* Content blocks */
  .content-block { margin-bottom: 10px; }
  .content-block:last-child { margin-bottom: 0; }

  /* Thinking blocks */
  .thinking-block {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .thinking-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--bg-elev-2);
    border: none;
    color: var(--text-faint);
    font-size: 11px;
    font-family: var(--font-sans);
    cursor: pointer;
    width: 100%;
    text-align: left;
  }

  .thinking-toggle:hover { color: var(--text-dim); }

  .thinking-toggle .arrow {
    display: inline-block;
    transition: transform 0.15s;
    font-size: 9px;
  }

  .thinking-toggle.open .arrow { transform: rotate(90deg); }

  .thinking-content {
    display: none;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-faint);
    font-style: italic;
    line-height: 1.7;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 400px;
    overflow-y: auto;
  }

  .thinking-content.open { display: block; }

  /* Tool use blocks */
  .tool-block {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--bg-elev-2);
  }

  .tool-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    letter-spacing: 0.3px;
  }

  .tool-pill.bash { background: rgba(74, 222, 128, 0.15); color: var(--bash-green); }
  .tool-pill.read, .tool-pill.write, .tool-pill.edit { background: rgba(90, 149, 214, 0.15); color: var(--read-blue); }
  .tool-pill.glob, .tool-pill.grep { background: rgba(234, 179, 8, 0.15); color: var(--grep-amber); }
  .tool-pill.webfetch, .tool-pill.websearch { background: rgba(167, 139, 250, 0.15); color: var(--web-purple); }
  .tool-pill.skill, .tool-pill.toolsearch, .tool-pill.notebookedit { background: rgba(139, 92, 246, 0.15); color: var(--sutra); }
  .tool-pill.default { background: rgba(138, 138, 148, 0.15); color: var(--text-dim); }

  .tool-desc {
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tool-input {
    padding: 8px 12px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    white-space: pre-wrap;
    word-wrap: break-word;
    background: var(--bg);
    max-height: 200px;
    overflow-y: auto;
  }

  /* Tool result blocks */
  .tool-result-block {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .tool-result-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--bg-elev-2);
    border: none;
    color: var(--text-faint);
    font-size: 11px;
    font-family: var(--font-sans);
    cursor: pointer;
    width: 100%;
    text-align: left;
  }

  .tool-result-toggle:hover { color: var(--text-dim); }

  .tool-result-toggle .arrow {
    display: inline-block;
    transition: transform 0.15s;
    font-size: 9px;
  }

  .tool-result-toggle.open .arrow { transform: rotate(90deg); }

  .tool-result-content {
    display: none;
    padding: 8px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-faint);
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 400px;
    overflow-y: auto;
    background: var(--bg);
    line-height: 1.5;
  }

  .tool-result-content.open { display: block; }

  /* Markdown rendering */
  .md-body {
    line-height: 1.7;
    color: var(--text);
  }

  .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
    margin-top: 16px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .md-body h1 { font-size: 18px; }
  .md-body h2 { font-size: 16px; }
  .md-body h3 { font-size: 14px; }

  .md-body p { margin-bottom: 8px; }

  .md-body ul, .md-body ol {
    margin-bottom: 8px;
    padding-left: 20px;
  }

  .md-body li { margin-bottom: 4px; }

  .md-body code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg-elev-2);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--sutra);
  }

  .md-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin-bottom: 8px;
  }

  .md-body pre code {
    background: none;
    padding: 0;
    color: var(--text-dim);
  }

  .md-body a {
    color: var(--user-accent);
    text-decoration: none;
  }

  .md-body a:hover { text-decoration: underline; }

  .md-body blockquote {
    border-left: 3px solid var(--border);
    padding-left: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .md-body table {
    border-collapse: collapse;
    margin-bottom: 8px;
    width: 100%;
  }

  .md-body th, .md-body td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    font-size: 12px;
  }

  .md-body th {
    background: var(--bg-elev-2);
    font-weight: 600;
  }

  /* Search highlight */
  mark.search-match {
    background: rgba(234, 179, 8, 0.35);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  mark.search-match.current {
    background: rgba(234, 179, 8, 0.7);
  }

  /* Scrollbar for sidebar */
  .sidebar-info::-webkit-scrollbar { width: 4px; }
  .sidebar-info::-webkit-scrollbar-track { background: transparent; }
  .sidebar-info::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Session Viewer</div>
      <button class="open-btn" id="openBtn" onclick="document.getElementById('fileInput').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        Open .jsonl file
      </button>
      <input type="file" class="file-input" id="fileInput" accept=".jsonl,.json">
    </div>
    <div class="sidebar-info" id="sidebarInfo">
      <div class="no-file-msg" id="noFileMsg">
        Drop a .jsonl file<br>or click Open above
      </div>
      <div class="file-meta" id="fileMeta" style="display:none"></div>
    </div>
  </div>

  <!-- Main Panel -->
  <div class="main-panel">
    <div class="stats-bar" id="statsBar"></div>
    <div class="search-bar" id="searchBar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search conversation...">
      <span class="search-count" id="searchCount"></span>
      <button class="search-close" id="searchClose">&times;</button>
    </div>
    <div class="conversation" id="conversation">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">&#8615;</div>
        <div class="drop-zone-text">Drop a session .jsonl file here</div>
        <div class="drop-zone-hint">or use the Open button in the sidebar</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import {
  computeStats, formatDuration, formatBytes, formatTokens,
  getToolPillClass, getToolDescription, getToolInput,
  summarizeSystemEvent, escapeHtml, renderMarkdown,
} from './lib/session.js';

(function() {
  'use strict';

  // Configure marked
  marked.setOptions({
    breaks: true,
    gfm: true
  });

  // State
  let currentEntries = [];
  let searchMatches = [];
  let currentMatchIdx = -1;

  // DOM refs
  const app = document.getElementById('app');
  const fileInput = document.getElementById('fileInput');
  const conversation = document.getElementById('conversation');
  const statsBar = document.getElementById('statsBar');
  const searchBar = document.getElementById('searchBar');
  const searchInput = document.getElementById('searchInput');
  const searchCount = document.getElementById('searchCount');
  const searchClose = document.getElementById('searchClose');
  const fileMeta = document.getElementById('fileMeta');
  const noFileMsg = document.getElementById('noFileMsg');

  // Drag and drop
  let dragCounter = 0;

  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    app.classList.add('drag-over');
  });

  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) app.classList.remove('drag-over');
  });

  document.addEventListener('dragover', (e) => e.preventDefault());

  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    app.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadFile(file);
  });

  // Search
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      searchBar.classList.add('active');
      searchInput.focus();
    }
    if (e.key === 'Escape') {
      searchBar.classList.remove('active');
      clearSearch();
    }
    if (e.key === 'Enter' && document.activeElement === searchInput) {
      if (e.shiftKey) navigateSearch(-1);
      else navigateSearch(1);
    }
  });

  searchInput.addEventListener('input', () => doSearch(searchInput.value));
  searchClose.addEventListener('click', () => {
    searchBar.classList.remove('active');
    clearSearch();
  });

  function clearSearch() {
    searchInput.value = '';
    searchCount.textContent = '';
    document.querySelectorAll('.message.highlighted').forEach(el => el.classList.remove('highlighted'));
    searchMatches = [];
    currentMatchIdx = -1;
  }

  function doSearch(query) {
    document.querySelectorAll('.message.highlighted').forEach(el => el.classList.remove('highlighted'));
    searchMatches = [];
    currentMatchIdx = -1;

    if (!query.trim()) {
      searchCount.textContent = '';
      return;
    }

    const q = query.toLowerCase();
    const messages = conversation.querySelectorAll('.message');
    messages.forEach(msg => {
      if (msg.textContent.toLowerCase().includes(q)) {
        searchMatches.push(msg);
      }
    });

    searchCount.textContent = searchMatches.length + ' found';
    if (searchMatches.length > 0) {
      currentMatchIdx = 0;
      searchMatches[0].classList.add('highlighted');
      searchMatches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function navigateSearch(dir) {
    if (searchMatches.length === 0) return;
    searchMatches[currentMatchIdx]?.classList.remove('highlighted');
    currentMatchIdx = (currentMatchIdx + dir + searchMatches.length) % searchMatches.length;
    searchMatches[currentMatchIdx].classList.add('highlighted');
    searchMatches[currentMatchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    searchCount.textContent = (currentMatchIdx + 1) + '/' + searchMatches.length;
  }

  // Load file
  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      parseAndRender(text, file.name, file.size, new Date(file.lastModified));
    };
    reader.readAsText(file);
  }

  // Parse JSONL
  function parseAndRender(text, fileName, fileSize, fileDate) {
    const lines = text.split('\n').filter(l => l.trim());
    const entries = [];

    for (const line of lines) {
      try {
        const obj = JSON.parse(line);
        entries.push(obj);
      } catch (e) {
        // skip malformed lines
      }
    }

    currentEntries = entries;

    // Compute stats
    const stats = computeStats(entries);

    // Render sidebar meta
    renderSidebar(fileName, fileSize, fileDate, stats, entries);

    // Render stats bar
    renderStatsBar(stats);

    // Render conversation
    renderConversation(entries);
  }

  function renderSidebar(fileName, fileSize, fileDate, stats, entries) {
    noFileMsg.style.display = 'none';
    fileMeta.style.display = 'flex';

    const rows = [
      ['File', fileName],
      ['Size', formatBytes(fileSize)],
      ['Date', (fileDate instanceof Date ? fileDate : new Date(fileDate)).toLocaleDateString()],
      ['Entries', String(stats.totalEntries)],
      ['User turns', String(stats.userTurns)],
      ['Asst turns', String(stats.assistantTurns)],
      ['Model', stats.model || '--'],
      ['Duration', formatDuration(stats.durationMs)],
      ['Input tokens', formatTokens(stats.inputTokens)],
      ['Output tokens', formatTokens(stats.outputTokens)],
      ['Cache read', formatTokens(stats.cacheReadTokens)],
      ['Cache create', formatTokens(stats.cacheCreateTokens)],
    ];

    if (stats.totalCost > 0) {
      rows.push(['Cost', '$' + stats.totalCost.toFixed(4)]);
    }

    fileMeta.innerHTML = rows.map(([label, value]) =>
      `<div class="file-meta-row"><span class="file-meta-label">${label}</span><span class="file-meta-value">${escapeHtml(value)}</span></div>`
    ).join('');
  }

  function renderStatsBar(stats) {
    statsBar.classList.add('active');
    const items = [
      ['Session', stats.sessionId ? stats.sessionId.slice(0, 8) + '...' : '--'],
      ['Turns', String(stats.totalTurns)],
      ['Tokens', formatTokens(stats.inputTokens + stats.outputTokens)],
      ['Duration', formatDuration(stats.durationMs)],
      ['Model', stats.model || '--'],
    ];
    if (stats.totalCost > 0) items.push(['Cost', '$' + stats.totalCost.toFixed(4)]);

    statsBar.innerHTML = items.map(([label, value]) =>
      `<div class="stat"><span class="stat-label">${label}</span><span class="stat-value">${escapeHtml(value)}</span></div>`
    ).join('');
  }

  function renderConversation(entries) {
    conversation.innerHTML = '';
    const frag = document.createDocumentFragment();

    // Group consecutive system events
    let systemGroup = [];

    function flushSystemGroup() {
      if (systemGroup.length === 0) return;
      const div = document.createElement('div');
      div.className = 'message msg-system';
      div.innerHTML = '<div class="message-role">System</div><div class="message-body">' +
        systemGroup.map(e => escapeHtml(summarizeSystemEvent(e))).join('<br>') + '</div>';
      frag.appendChild(div);
      systemGroup = [];
    }

    for (const entry of entries) {
      // Skip progress and file-history-snapshot
      if (entry.type === 'progress' || entry.type === 'file-history-snapshot') continue;

      if (entry.type === 'system') {
        systemGroup.push(entry);
        continue;
      }

      flushSystemGroup();

      if (entry.type === 'user') {
        frag.appendChild(renderUserMessage(entry));
      } else if (entry.type === 'assistant') {
        frag.appendChild(renderAssistantMessage(entry));
      } else if (entry.type === 'result') {
        frag.appendChild(renderResultCard(entry));
      }
    }

    flushSystemGroup();
    conversation.appendChild(frag);
  }

  function renderUserMessage(entry) {
    const div = document.createElement('div');
    div.className = 'message msg-user';

    const content = entry.message?.content;
    let text = '';
    if (typeof content === 'string') {
      text = content;
    } else if (Array.isArray(content)) {
      text = content.map(b => {
        if (typeof b === 'string') return b;
        if (b.type === 'text') return b.text || '';
        return '[' + (b.type || 'unknown') + ']';
      }).join('\n');
    }

    const timeStr = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';
    div.innerHTML = `<div class="message-role">User <span style="font-weight:400;color:var(--text-faint);font-size:10px;margin-left:8px">${timeStr}</span></div>` +
      `<div class="message-body">${escapeHtml(text)}</div>`;
    return div;
  }

  function renderAssistantMessage(entry) {
    const div = document.createElement('div');
    div.className = 'message msg-assistant';

    const content = entry.message?.content;
    const timeStr = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';
    const modelStr = entry.message?.model || '';

    let roleExtra = '';
    if (timeStr) roleExtra += `<span style="font-weight:400;color:var(--text-faint);font-size:10px;margin-left:8px">${timeStr}</span>`;
    if (modelStr) roleExtra += `<span style="font-weight:400;color:var(--text-faint);font-size:10px;margin-left:8px">${escapeHtml(modelStr)}</span>`;

    let html = `<div class="message-role">Assistant${roleExtra}</div><div class="message-body">`;

    if (Array.isArray(content)) {
      for (const block of content) {
        html += renderContentBlock(block);
      }
    } else if (typeof content === 'string') {
      html += `<div class="content-block md-body">${renderMarkdown(content)}</div>`;
    }

    html += '</div>';
    div.innerHTML = html;

    // Attach event listeners for collapsibles
    div.querySelectorAll('.thinking-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('open');
        btn.nextElementSibling.classList.toggle('open');
      });
    });

    div.querySelectorAll('.tool-result-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('open');
        btn.nextElementSibling.classList.toggle('open');
      });
    });

    return div;
  }

  function renderContentBlock(block) {
    if (!block || !block.type) return '';

    if (block.type === 'thinking') {
      const text = block.thinking || block.text || '';
      if (!text.trim()) return '';
      const preview = text.slice(0, 80).replace(/\n/g, ' ') + (text.length > 80 ? '...' : '');
      return `<div class="content-block thinking-block">
        <button class="thinking-toggle"><span class="arrow">&#9654;</span> Thinking: ${escapeHtml(preview)}</button>
        <div class="thinking-content">${escapeHtml(text)}</div>
      </div>`;
    }

    if (block.type === 'text') {
      const text = block.text || '';
      if (!text.trim()) return '';
      return `<div class="content-block md-body">${renderMarkdown(text)}</div>`;
    }

    if (block.type === 'tool_use') {
      return renderToolUse(block);
    }

    if (block.type === 'tool_result') {
      return renderToolResult(block);
    }

    return '';
  }

  function renderToolUse(block) {
    const name = block.name || 'Unknown';
    const pillClass = getToolPillClass(name);
    const desc = getToolDescription(block);
    const inputText = getToolInput(block);

    let html = `<div class="content-block tool-block">
      <div class="tool-header">
        <span class="tool-pill ${pillClass}">${escapeHtml(name)}</span>
        <span class="tool-desc">${escapeHtml(desc)}</span>
      </div>`;

    if (inputText) {
      html += `<div class="tool-input">${escapeHtml(inputText)}</div>`;
    }

    html += '</div>';
    return html;
  }

  function renderToolResult(block) {
    let content = block.content || block.output || '';
    if (typeof content !== 'string') {
      if (Array.isArray(content)) {
        content = content.map(c => {
          if (typeof c === 'string') return c;
          if (c.type === 'text') return c.text || '';
          return JSON.stringify(c);
        }).join('\n');
      } else {
        content = JSON.stringify(content, null, 2);
      }
    }

    const isError = block.is_error === true;
    const lines = content.split('\n').length;
    const preview = content.slice(0, 100).replace(/\n/g, ' ') + (content.length > 100 ? '...' : '');
    const label = isError ? 'Error output' : 'Tool result';
    const errorStyle = isError ? 'color:#f87171;' : '';

    return `<div class="content-block tool-result-block">
      <button class="tool-result-toggle"><span class="arrow">&#9654;</span> <span style="${errorStyle}">${label} (${lines} lines)</span></button>
      <div class="tool-result-content">${escapeHtml(content)}</div>
    </div>`;
  }

  function renderResultCard(entry) {
    const div = document.createElement('div');
    div.className = 'message msg-result';

    const items = [];
    if (entry.costUSD != null) items.push(['Cost', '$' + entry.costUSD.toFixed(4)]);
    if (entry.totalCostUSD != null) items.push(['Total Cost', '$' + entry.totalCostUSD.toFixed(4)]);
    if (entry.duration_ms != null) items.push(['Duration', formatDuration(entry.duration_ms)]);
    if (entry.durationMs != null) items.push(['Duration', formatDuration(entry.durationMs)]);
    if (entry.model) items.push(['Model', entry.model]);
    if (entry.usage) {
      if (entry.usage.input_tokens) items.push(['Input tokens', formatTokens(entry.usage.input_tokens)]);
      if (entry.usage.output_tokens) items.push(['Output tokens', formatTokens(entry.usage.output_tokens)]);
    }
    if (entry.numTurns != null) items.push(['Turns', String(entry.numTurns)]);
    if (entry.result) {
      const resultText = typeof entry.result === 'string' ? entry.result : JSON.stringify(entry.result);
      if (resultText.length < 200) items.push(['Result', resultText]);
    }

    let html = '<div class="message-role">Session Result</div>';
    if (items.length > 0) {
      html += '<div class="result-grid">';
      for (const [label, value] of items) {
        html += `<div class="result-item"><div class="result-item-label">${escapeHtml(label)}</div><div class="result-item-value">${escapeHtml(value)}</div></div>`;
      }
      html += '</div>';
    }

    div.innerHTML = html;
    return div;
  }

  // Keyboard nav: up/down to scroll between messages
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === searchInput) return;
    if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault();
      scrollToNextMessage(1);
    }
    if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      scrollToNextMessage(-1);
    }
  });

  let currentMsgIndex = -1;

  function scrollToNextMessage(dir) {
    const msgs = conversation.querySelectorAll('.message');
    if (msgs.length === 0) return;
    currentMsgIndex = Math.max(0, Math.min(msgs.length - 1, currentMsgIndex + dir));
    msgs[currentMsgIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Auto-load from URL params: ?session=X&cwd=Y
  const params = new URLSearchParams(window.location.search);
  const autoSession = params.get('session');
  const autoCwd = params.get('cwd');
  const autoAgentId = params.get('agent_id');
  const autoSubagent = params.get('subagent');
  const autoParent = params.get('parent');
  if (autoSession && (autoCwd || autoAgentId)) {
    let qs = autoCwd ? `cwd=${autoCwd}` : `agent_id=${autoAgentId}`;
    if (autoSubagent && autoParent) {
      qs += `&subagent=${autoSubagent}&parent=${autoParent}`;
    }
    fetch(`/api/session-file/${autoSession}?${qs}`)
      .then(r => {
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        return r.text();
      })
      .then(text => {
        parseAndRender(text, `${autoSession}.jsonl`, text.length, new Date().toISOString());
      })
      .catch(err => {
        conversation.innerHTML = `<div style="color:#ef4444;padding:40px;text-align:center;">Failed to load session: ${err.message}<br><br><span style="color:var(--text-dim);font-size:12px;">Try dragging the file directly instead.</span></div>`;
      });
  }

})();
</script>
</body>
</html>
