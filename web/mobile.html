<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>sutra</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --bg-msg: #1a1a2e;
            --bg-user: #2d1b69;
            --text: #e8e8f0;
            --text-muted: #888;
            --accent: #a855f7;
            --border: #2a2a3e;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .status {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .header .status.online { color: #4ade80; }
        .header .status.offline { color: #ef4444; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: var(--bg-user);
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: var(--bg-msg);
            border-bottom-left-radius: 4px;
        }
        .msg .meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .msg.loading {
            color: var(--text-muted);
            font-style: italic;
        }

        .input-area {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            background: var(--bg-msg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }
        .input-area input::placeholder { color: var(--text-muted); }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-area button:disabled { opacity: 0.4; }
    </style>
</head>
<body>
    <div class="header">
        <h1>sutra</h1>
        <span class="status" id="status">connecting...</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Talk to Sutra..."
               onkeydown="if(event.key==='Enter')send()" autocomplete="off">
        <button onclick="send()" id="sendBtn">&#x2191;</button>
    </div>

    <script>
    const API_BASE = `${location.protocol}//${location.hostname}:8890`;
    let token = localStorage.getItem('sutra-token') || '';
    let lastConnected = null;

    async function init() {
        // Try to get token
        if (!token) {
            try {
                const resp = await fetch(`${API_BASE}/api/sutra/token`);
                const data = await resp.json();
                token = data.token;
                localStorage.setItem('sutra-token', token);
            } catch (e) {
                setStatus('offline');
                return;
            }
        }

        // Check health
        try {
            const resp = await fetch(`${API_BASE}/api/health`);
            if (resp.ok) {
                setStatus('online');
                lastConnected = new Date();
            }
        } catch (e) {
            setStatus('offline');
        }
    }

    function setStatus(s) {
        const el = document.getElementById('status');
        el.className = 'status ' + s;
        if (s === 'online') {
            el.textContent = 'connected';
        } else if (s === 'offline') {
            el.textContent = lastConnected
                ? `offline - last connected ${lastConnected.toLocaleTimeString()}`
                : 'offline';
        } else {
            el.textContent = s;
        }
    }

    function addMessage(role, text, meta) {
        const el = document.createElement('div');
        el.className = 'msg ' + role;
        el.textContent = text;
        if (meta) {
            const metaEl = document.createElement('div');
            metaEl.className = 'meta';
            metaEl.textContent = meta;
            el.appendChild(metaEl);
        }
        document.getElementById('messages').appendChild(el);
        el.scrollIntoView({ behavior: 'smooth' });
        return el;
    }

    async function send() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        addMessage('user', text);
        const loadingEl = addMessage('assistant', 'Thinking...');
        loadingEl.classList.add('loading');

        document.getElementById('sendBtn').disabled = true;

        try {
            const resp = await fetch(`${API_BASE}/api/sutra`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                },
                body: JSON.stringify({ text }),
            });

            loadingEl.remove();

            if (resp.ok) {
                const data = await resp.json();
                const meta = `$${data.cost_usd?.toFixed(4) || '0.00'} | ${data.model || ''}`;
                addMessage('assistant', data.text, meta);
                setStatus('online');
                lastConnected = new Date();
            } else if (resp.status === 401) {
                // Token expired, clear and retry
                localStorage.removeItem('sutra-token');
                token = '';
                addMessage('assistant', 'Authentication failed. Refreshing token...');
                await init();
            } else {
                const err = await resp.json().catch(() => ({}));
                addMessage('assistant', `Error: ${err.error || resp.statusText}`);
            }
        } catch (e) {
            loadingEl.remove();
            addMessage('assistant', `Sutra offline: ${e.message}`);
            setStatus('offline');
        }

        document.getElementById('sendBtn').disabled = false;
        input.focus();
    }

    init();
    </script>
</body>
</html>
