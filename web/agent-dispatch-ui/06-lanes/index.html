<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lanes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #0e0e10;
    --rule: #1f1f23;
    --rule-strong: #2a2a30;
    --ink: #e7e7ea;
    --ink-dim: #8a8a92;
    --ink-faint: #55555c;
    --accent: #6ea8ff;        /* muted electric blue */
    --amber: #d9a25a;
    --red: #d06a6a;
    --p0: #6ea8ff;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }

  .stage {
    max-width: 1120px;
    margin: 0 auto;
    padding: 96px 72px 96px;
    min-height: 100vh;
  }

  /* ----- Header ----- */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 72px;
  }
  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .hud {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .hud .dot-sep { margin: 0 10px; color: var(--ink-faint); }

  /* ----- Dispatch input ----- */
  .dispatch {
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    margin-bottom: 56px;
  }
  .dispatch .caret {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
  }
  .dispatch input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 15px;
    padding: 4px 0;
    letter-spacing: 0.005em;
  }
  .dispatch input::placeholder {
    color: var(--ink-faint);
    font-weight: 300;
  }

  /* ----- Queue row ----- */
  .queue {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
    min-height: 20px;
    align-items: center;
  }
  .queue-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 4px;
  }
  .chip {
    font-size: 12px;
    color: var(--ink-dim);
    padding: 3px 0;
    border-left: 1px solid var(--rule-strong);
    padding-left: 10px;
    margin-right: 6px;
    white-space: nowrap;
    opacity: 0;
    transform: translateX(-6px);
    animation: chipIn .35s ease-out forwards;
  }
  @keyframes chipIn {
    to { opacity: 1; transform: translateX(0); }
  }
  .chip.leaving {
    animation: chipOut .3s ease-in forwards;
  }
  @keyframes chipOut {
    to { opacity: 0; transform: translateX(-10px); }
  }

  /* ----- Lanes ----- */
  .lanes {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .lane {
    position: relative;
    display: grid;
    grid-template-columns: 280px 1fr;
    align-items: center;
    padding: 22px 0;
    border-top: 1px solid var(--rule);
  }
  .lane:last-child { border-bottom: 1px solid var(--rule); }

  .lane-label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-right: 32px;
  }
  .prio {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    width: 18px;
  }
  .prio.p0 { color: var(--p0); }

  .title {
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity .5s ease, color .5s ease;
  }
  .title.fading { opacity: 0.15; color: var(--ink-faint); }

  /* ----- Track ----- */
  .track {
    position: relative;
    height: 24px;
  }
  .baseline {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: var(--rule);
    transform: translateY(-0.5px);
  }
  .lane.p0 .baseline {
    height: 2px;
    background: var(--rule-strong);
  }
  .finish {
    position: absolute;
    right: 0;
    top: 50%;
    width: 1px;
    height: 14px;
    background: var(--ink-faint);
    transform: translateY(-7px);
  }

  .token {
    position: absolute;
    top: 50%;
    left: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink);
    transform: translate(-50%, -50%);
    transition: background .3s ease, box-shadow .3s ease;
    cursor: default;
  }
  .token.paused {
    background: var(--amber);
    box-shadow: 0 0 0 6px rgba(217,162,90,0.12);
    cursor: pointer;
  }
  .token.blocked {
    background: var(--red);
    box-shadow: 0 0 0 5px rgba(208,106,106,0.10);
  }
  .token.completed {
    background: var(--accent);
  }

  /* flash when a lane completes */
  .lane.flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0.06;
    pointer-events: none;
    animation: flash .6s ease-out forwards;
  }
  @keyframes flash {
    0% { opacity: 0.10; }
    100% { opacity: 0; }
  }

  /* new task slide-in */
  .title.incoming {
    animation: slideIn .5s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Footer ambient */
  footer {
    margin-top: 96px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
  }

  ::selection { background: rgba(110,168,255,0.25); }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <div class="brand">Lanes</div>
      <div class="hud" id="hud">0 done today <span class="dot-sep">·</span> 4-day streak</div>
    </header>

    <div class="dispatch">
      <span class="caret">&gt;</span>
      <input id="dispatch-input" type="text" placeholder="dispatch a task" autocomplete="off" spellcheck="false" />
    </div>

    <div class="queue" id="queue">
      <span class="queue-label">Queue</span>
    </div>

    <div class="lanes" id="lanes"></div>

    <footer>
      <span>8 agents</span>
      <span id="foot-status">idle · 0 · 0 · 0</span>
    </footer>
  </div>

<script>
(() => {
  // ---------- Data ----------
  const seedTasks = [
    { title: 'Refactor auth middleware',       p0: true,  diff: 1.0 },
    { title: 'Draft Q2 OKRs',                  p0: false, diff: 0.8 },
    { title: 'Review PR #482',                 p0: false, diff: 1.3 },
    { title: 'Book dentist',                   p0: false, diff: 1.6 },
    { title: 'Research vendor options',        p0: false, diff: 0.7 },
    { title: 'Migrate billing to Stripe v2',   p0: true,  diff: 0.5 },
    { title: 'Write launch announcement',      p0: false, diff: 0.9 },
    { title: 'Fix flaky integration test',     p0: false, diff: 1.1 },
  ];

  const queueSeed = [
    { title: 'Triage inbox', p0: false },
    { title: 'Reply to design feedback', p0: false },
    { title: 'Plan onboarding revamp', p0: true },
    { title: 'Upgrade Node to 20', p0: false },
  ];

  const taskPool = [
    { title: 'Audit dependency licenses',     p0: false, diff: 1.2 },
    { title: 'Draft weekly update',           p0: false, diff: 1.5 },
    { title: 'Review infra cost report',      p0: false, diff: 0.9 },
    { title: 'Rewrite onboarding email',      p0: false, diff: 1.1 },
    { title: 'Investigate 500s on /api/v2',   p0: true,  diff: 0.6 },
    { title: 'Schedule 1:1s for next week',   p0: false, diff: 1.8 },
    { title: 'Consolidate staging accounts',  p0: false, diff: 0.8 },
    { title: 'Prep board slide deck',         p0: true,  diff: 0.7 },
    { title: 'Renew TLS certs',               p0: false, diff: 1.4 },
    { title: 'Follow up with recruiter',      p0: false, diff: 1.6 },
    { title: 'Reconcile expense report',      p0: false, diff: 1.3 },
    { title: 'Draft incident postmortem',     p0: true,  diff: 0.6 },
  ];

  // ---------- State ----------
  const lanesEl = document.getElementById('lanes');
  const queueEl = document.getElementById('queue');
  const hudEl = document.getElementById('hud');
  const footStatus = document.getElementById('foot-status');
  const input = document.getElementById('dispatch-input');

  const lanes = []; // { el, titleEl, tokenEl, task, progress, speed, state }
  let queue = queueSeed.slice();
  let doneToday = 12;
  const streakDays = 4;

  // ---------- Rendering ----------
  function makeLane(task, index) {
    const lane = document.createElement('div');
    lane.className = 'lane' + (task.p0 ? ' p0' : '');

    const label = document.createElement('div');
    label.className = 'lane-label';

    const prio = document.createElement('span');
    prio.className = 'prio' + (task.p0 ? ' p0' : '');
    prio.textContent = task.p0 ? 'P0' : '—';

    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = task.title;

    label.appendChild(prio);
    label.appendChild(title);

    const track = document.createElement('div');
    track.className = 'track';

    const baseline = document.createElement('div');
    baseline.className = 'baseline';

    const finish = document.createElement('div');
    finish.className = 'finish';

    const token = document.createElement('div');
    token.className = 'token';

    track.appendChild(baseline);
    track.appendChild(finish);
    track.appendChild(token);

    lane.appendChild(label);
    lane.appendChild(track);

    lanesEl.appendChild(lane);

    const laneObj = {
      el: lane,
      titleEl: title,
      prioEl: prio,
      trackEl: track,
      tokenEl: token,
      task,
      progress: 0,
      speed: 0.12 + Math.random() * 0.18 * (1 / Math.max(task.diff, 0.5)),
      state: 'active', // active | paused | blocked | completed | empty
    };

    token.addEventListener('click', () => {
      if (laneObj.state === 'paused') {
        setState(laneObj, 'active');
      }
    });

    return laneObj;
  }

  function setState(lane, state) {
    lane.state = state;
    lane.tokenEl.classList.remove('paused', 'blocked', 'completed');
    if (state === 'paused') lane.tokenEl.classList.add('paused');
    if (state === 'blocked') lane.tokenEl.classList.add('blocked');
    if (state === 'completed') lane.tokenEl.classList.add('completed');
  }

  function renderQueue() {
    // keep label, rebuild chips
    const existing = queueEl.querySelectorAll('.chip');
    existing.forEach(c => c.remove());
    queue.forEach(q => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = q.title;
      queueEl.appendChild(chip);
    });
  }

  function updateHUD() {
    hudEl.innerHTML = `${doneToday} done today <span class="dot-sep">·</span> ${streakDays}-day streak`;
    const active = lanes.filter(l => l.state === 'active').length;
    const paused = lanes.filter(l => l.state === 'paused').length;
    const blocked = lanes.filter(l => l.state === 'blocked').length;
    footStatus.textContent = `${active} running · ${paused} paused · ${blocked} blocked`;
  }

  // ---------- Seed ----------
  seedTasks.forEach((t, i) => {
    const lane = makeLane(t, i);
    // varied starting positions
    lane.progress = Math.random() * 65 + 5;
    lanes.push(lane);
  });

  // Seed 1-2 attention states
  setState(lanes[2], 'paused');
  setState(lanes[5], 'blocked');

  renderQueue();
  updateHUD();
  positionAll();

  // ---------- Motion ----------
  function positionAll() {
    lanes.forEach(lane => {
      const w = lane.trackEl.clientWidth;
      const x = Math.min(lane.progress, 100) / 100 * w;
      lane.tokenEl.style.left = `${x}px`;
    });
  }

  function tick() {
    lanes.forEach(lane => {
      if (lane.state !== 'active') return;
      // small per-tick advance
      lane.progress += lane.speed;
      if (lane.progress >= 100) {
        complete(lane);
      }
    });
    positionAll();
  }

  function complete(lane) {
    setState(lane, 'completed');
    lane.progress = 100;
    lane.titleEl.classList.add('fading');
    lane.el.classList.add('flash');
    doneToday += 1;
    updateHUD();

    setTimeout(() => {
      lane.el.classList.remove('flash');
      // pull from queue, else pool
      let next;
      if (queue.length) {
        next = queue.shift();
        next.diff = 0.6 + Math.random() * 1.2;
        renderQueue();
      } else {
        next = { ...taskPool[Math.floor(Math.random() * taskPool.length)] };
      }
      lane.task = next;
      lane.progress = 0;
      lane.speed = 0.12 + Math.random() * 0.18 * (1 / Math.max(next.diff || 1, 0.5));
      lane.titleEl.classList.remove('fading');
      lane.titleEl.textContent = next.title;
      lane.titleEl.classList.remove('incoming');
      // reflow to restart animation
      void lane.titleEl.offsetWidth;
      lane.titleEl.classList.add('incoming');

      lane.prioEl.classList.toggle('p0', !!next.p0);
      lane.prioEl.textContent = next.p0 ? 'P0' : '—';
      lane.el.classList.toggle('p0', !!next.p0);

      setState(lane, 'active');
      updateHUD();
    }, 900);
  }

  // ---------- Ambient state changes ----------
  function ambient() {
    // sometimes pause an active lane
    const active = lanes.filter(l => l.state === 'active');
    if (active.length && Math.random() < 0.18) {
      const l = active[Math.floor(Math.random() * active.length)];
      setState(l, 'paused');
      updateHUD();
    }
    // sometimes auto-resume a paused lane (as if input was provided elsewhere)
    const paused = lanes.filter(l => l.state === 'paused');
    if (paused.length && Math.random() < 0.35) {
      const l = paused[Math.floor(Math.random() * paused.length)];
      setState(l, 'active');
      updateHUD();
    }
    // rare: a block clears
    const blocked = lanes.filter(l => l.state === 'blocked');
    if (blocked.length && Math.random() < 0.25) {
      const l = blocked[Math.floor(Math.random() * blocked.length)];
      setState(l, 'active');
      updateHUD();
    }
  }

  // ---------- Dispatch ----------
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      if (!val) return;
      const isP0 = /^p0\s+/i.test(val);
      const title = isP0 ? val.replace(/^p0\s+/i, '') : val;
      queue.push({ title, p0: isP0 });
      renderQueue();
      input.value = '';
    }
  });

  // ---------- Loops ----------
  setInterval(tick, 80);            // smooth motion
  setInterval(ambient, 4200);       // ambient state flips
  window.addEventListener('resize', positionAll);
})();
</script>
</body>
</html>
